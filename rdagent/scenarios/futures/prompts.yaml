futures_factor_background: |-
  You are developing quantitative trading strategies for Taiwan Futures (台指期, TX).
  TX is the TAIEX index futures contract, the most liquid futures product on the Taiwan Futures Exchange (TAIFEX).

  Market characteristics:
  - Underlying: TAIEX (加權指數), Taiwan's main stock index
  - Contract: 台股指數近月 FITX*1.TF
  - Contract multiplier: 200 NTD per index point
  - Tick size: 1 index point
  - Typical intraday range: 50 – 300 index points
  - Trading hours:
      Day session   (日盤): 08:45 – 13:45 CST
      Night session (夜盤): 15:00 – 05:00 CST (next calendar day)
  - Transaction cost: 1.525 index points per side
      (1.525 pts = (105 NTD commission + 200 NTD slippage) ÷ 200 NTD/pt)
  - Positions carry across sessions and days (每日部位歸零 = No)

  Your task is to design a 1-minute signal that generates actionable long/short signals for intraday TX trading.
  Both trend-following and mean-reverting approaches are valid.
  Session-specific behavior (day vs night) is encouraged to explore.

  The specific factor families to explore in this run are injected via the user prompt
  (see the "strategy" section). Follow whatever scope is given there.

  Cross-session position holding is fully supported. Consider strategies that enter during the day session
  and hold through the night, or exploit overnight gap dynamics (night open vs. previous day close).
  You do NOT need to close positions at session boundaries — a signal that stays non-zero across the
  13:45 close or the 05:00 close will carry the position into the next session at no extra cost.

  COST BARRIER — read carefully:
  Round-trip cost is 3.05 pts (610 NTD). The only requirement is that the average profit per
  completed trade exceeds 3.05 pts in expectation. How you achieve this is flexible:
  - A high-frequency strategy trading many times per day can work IF each trade captures a
    large enough move (e.g. momentum bursts, volatility spikes, opening range breakouts).
  - A low-frequency strategy trading once per day can work with smaller per-bar edge but
    needs consistent directional conviction.
  - What NEVER works: near-random entry/exit that relies purely on mean reversion of 1–2 pts,
    or strategies that flip direction every bar and donate cost on every turn.
  - Target: E[profit per round-trip] > 3.05 pts. With typical TX intraday volatility of
    50–300 pts/day, a well-timed entry can easily capture 5–30 pts before reversal.

  LOOK-AHEAD BIAS — forbidden patterns:
  Never use intraday daily high/low/open/close computed from the FULL day's data at each bar.
  Specifically, the following code pattern introduces look-ahead bias and will be auto-detected and REJECTED:
      df['col'].groupby(df.index.date).transform('max')   # ← FORBIDDEN
      df['col'].groupby(df.index.date).transform('min')   # ← FORBIDDEN
      df['col'].groupby(df.index.date).transform('first') # ← FORBIDDEN
  These are look-ahead because at bar t=09:00, this expression already knows the day's high at 13:00.
  Use only information available up to and including the current bar (rolling windows, cumulative within session, etc.).

  ROBUSTNESS REQUIREMENT:
  A good strategy must work across multiple market regimes. The evaluation period covers 2020–2026,
  which includes COVID crash, bull markets, bear markets, sideways, and rate-hike regimes.
  A strategy that only works in one particular year (regime-specific) is NOT acceptable.
  Target: positive Sharpe in at least 4 out of 6 years (2020, 2021, 2022, 2023, 2024, 2025).

futures_factor_source_data: |-
  Historical 1-minute OHLCV data for TX (台指期主力合約) is stored in "data.parquet".

  Schema:
    Index  : pd.DatetimeIndex at 1-minute frequency (e.g., 2020-01-30 08:45:00)
    Columns:
      open    float64   Opening price of the 1-min bar (index points)
      high    float64   Highest price of the 1-min bar
      low     float64   Lowest price of the 1-min bar
      close   float64   Closing price of the 1-min bar
      volume  float64   Volume traded in the 1-min bar (contracts / 口)
      session str       "day" (08:45–13:45) or "night" (15:00–05:00 next day)

  Data range: 2020-01-30 to 2026-04-03 (~1,500 trading days, ~450,000 1-min bars).

  Loading:
    import pandas as pd
    df = pd.read_parquet("data.parquet")

futures_factor_interface: |-
  Your factor.py must be a self-contained Python script that follows this exact interface:

  Step 1 – Load data:
      df = pd.read_parquet("data.parquet")

  Step 2 – Compute a signal (pd.Series):
      - Must share the same DatetimeIndex as df
      - Positive value  →  Bullish / Long signal
      - Negative value  →  Bearish / Short signal
      - Value near 0    →  No position (flat)
      - Must have NO NaN values (use .fillna(0) before saving)
      - IMPORTANT: The final `signal` variable MUST be a pd.Series, NOT a pd.DataFrame.
        If your computation yields a DataFrame, select one column or call .squeeze() to
        convert it to a Series before the save step.

  Optional enhancements:

  A. Time-of-day filter — mask signal to 0 outside profitable windows:
      import datetime
      t = df.index.time
      # Example: only trade 09:00–13:15 in day session, skip final 30 min
      day_trade = pd.Series(
          [(x >= datetime.time(9, 0)) and (x <= datetime.time(13, 15)) for x in t],
          index=df.index
      )
      night_trade = df['session'] == 'night'
      time_mask = (day_trade & (df['session'] == 'day')) | night_trade
      signal = signal * time_mask.astype(float)

  B. Session-open / session-close avoidance — avoid first & last N minutes:
      import datetime
      t = df.index.time
      avoid = pd.Series(
          [(x < datetime.time(9, 0)) or (x > datetime.time(13, 30)) for x in t],
          index=df.index
      )
      signal[avoid & (df['session'] == 'day')] = 0.0

  Step 3 – Save result (always use this exact block verbatim):
      # ── type guard ───────────────────────────────────────────────────
      if isinstance(signal, pd.DataFrame):
          signal = signal.squeeze()            # only works for single-column DataFrames
      assert isinstance(signal, pd.Series), (
          f"signal must be pd.Series before saving, got {type(signal)}"
      )
      signal = signal.fillna(0)
      signal.name = "signal"
      signal.to_hdf("result.h5", key="signal", mode="w")

  Minimal example:
  ```python
  import pandas as pd
  import numpy as np

  df = pd.read_parquet("data.parquet")

  # 20-bar price momentum
  signal = df["close"].pct_change(20).fillna(0)

  # ── Save (always copy this block exactly) ────────────────────────────
  if isinstance(signal, pd.DataFrame):
      signal = signal.squeeze()
  assert isinstance(signal, pd.Series), (
      f"signal must be pd.Series before saving, got {type(signal)}"
  )
  signal = signal.fillna(0)
  signal.name = "signal"
  signal.to_hdf("result.h5", key="signal", mode="w")
  ```

  Allowed libraries: pandas, numpy, scipy, scikit-learn, ta (if installed).
  Do NOT import external data sources or network calls.

  STRICTLY NO LOOK-AHEAD BIAS: Every value in the signal at bar t must be computable
  using ONLY information available up to and including bar t.  The most common violation
  is using a groupby-then-transform aggregation that leaks future bars within the same
  group (e.g. same trading day).  Use the expanding/rolling equivalents instead:

    WRONG  (leaks future data within the day):
      high.groupby(df['date']).transform('max')   # uses the full day's high — future bars!
      close.groupby(df['date']).transform('mean') # uses the full day's average
      volume.groupby(df['date']).transform('sum')  # uses the full day's total volume

    CORRECT (only past bars up to the current bar):
      high.groupby(df['date']).cummax()            # running max within the day up to bar t
      close.groupby(df['date']).expanding().mean().reset_index(level=0, drop=True)
      volume.groupby(df['date']).cumsum()          # running cumulative sum

  Other common look-ahead patterns to avoid:
    WRONG : signal = close / close.groupby(df['date']).transform('last')   # leaks session close
    WRONG : signal = (close - close.mean())                                # uses full-series mean
    WRONG : signal = pd.DataFrame({'s': signal}).assign(
                         s2=lambda x: x['s'].shift(-1))['s2']             # negative shift = future
    CORRECT: always use .rolling(N), .expanding(), .cumsum(), .cummax(),
             .cummin() — or shift with a positive lag .shift(1) to align
             a computed value to the bar *after* it was known.

  When in doubt, ask: "Could a trader have computed this number at bar t
  without knowing any bar after t?"  If the answer is no, the code has
  look-ahead bias and must be rewritten.

  PANDAS GROUPBY API — critical:
  A GroupBy object's `[]` operator selects COLUMN NAMES, NOT Series values.
  To apply rolling within groups, call `.groupby()` directly on the Series:

    WRONG  (tries to use a Series of float values as column names → KeyError):
      g = df.groupby(df.index.date)
      flow = (df['close'] - df['open']) * df['volume']
      M = g[flow].rolling(60).sum()           # g[flow] means "select column named flow"!

    CORRECT (rolling within each day's group):
      flow = (df['close'] - df['open']) * df['volume']
      M = flow.groupby(df.index.date, group_keys=False).rolling(60, min_periods=1).sum()

    Also correct for a named column:
      g['volume'].rolling(60).mean()          # selects 'volume' column by name ← OK

  PROHIBITED: Do NOT implement ATR-based stop loss or take profit logic.
  This includes trailing stops keyed to ATR multiples, ATR-scaled exit thresholds,
  or any position-management rule that closes/flips a position based on an ATR
  distance from entry.  The signal must encode only directional conviction
  (positive = long, negative = short, ~0 = flat); risk management is handled
  externally by the backtest framework.

futures_factor_output_format: |-
  Write a file named "result.h5" to the current directory containing a pd.Series:
    - Key  : "signal"
    - Type : pd.Series  (NOT pd.DataFrame — saving a DataFrame will cause test failure)
    - Index: pd.DatetimeIndex (identical to df.index from data.parquet)
    - dtype: float64
    - NaN  : NOT allowed (use .fillna(0))

  Common mistake: if your code computes a multi-column intermediate DataFrame and you
  call .to_hdf() on the DataFrame (or on a single-column DataFrame), the saved object
  is a DataFrame, not a Series. Always call .squeeze() or select a single column before
  the save block.

  Verification:
    signal = pd.read_hdf("result.h5", key="signal")
    assert isinstance(signal, pd.Series), f"got {type(signal)}"
    assert signal.name == "signal"
    assert signal.isna().sum() == 0

futures_factor_simulator: |-
  The signal is evaluated by a vectorized position-based backtest:

  Backtest settings (FITX*1.TF, 1-minute bars, 2020-01-01 ~ 2026-04-15):
    1. Position  : sign(signal) → +1 (Long), -1 (Short), 0 (Flat)
    2. Execution : at the OPEN of the next 1-min bar (no slippage)
    3. Cost      : 1.525 pts per side (round-trip = 3.05 pts)
                   1.525 pts = (105 NTD commission + 200 NTD slippage) ÷ 200 NTD/pt
    4. Daily reset: 每日部位歸零 = No — positions carry freely across sessions and days

  Metrics reported (test period only):
    sharpe            – Annualized Sharpe ratio based on DAILY P&L returns × √252
                        (same methodology as the notebook backtest engine)
    annual_return_pts – Average annual P&L in index points
    max_drawdown_pts  – Peak-to-trough drawdown in index points (cumulative P&L curve)
    n_trades          – Number of completed round-trip trades
    day_sharpe        – Daily Sharpe for day-session P&L only
    night_sharpe      – Daily Sharpe for night-session P&L only
    year_sharpes      – Per-year Sharpe (daily basis), e.g. {'2020': -0.36, '2021': 0.70, ...}
    n_positive_years  – Count of years with positive Sharpe

  A good signal has: sharpe > 0.5, n_positive_years >= 4, n_trades >= 200.

hypothesis_output_format: |-
  Respond with a JSON object:
  {
      "hypothesis": "<one concise sentence: the signal or rule to test>",
      "reason": "<detailed reasoning: why this pattern might predict TX price movements>",
      "concise_reason": "<one-sentence summary of reasoning>",
      "concise_observation": "<what pattern or prior result prompted this hypothesis>",
      "concise_justification": "<why this is worth testing now>",
      "concise_knowledge": "<relevant domain knowledge about TX or intraday futures>",
      "method_type": "<short label for the factor family — use the families specified in the user-level strategy prompt if one is given; otherwise pick a descriptive snake_case label>"
  }

hypothesis_specification: |-
  The user-level strategy prompt (injected via --strategy) specifies which factor families
  to explore this run. Follow whatever scope is given there. This section covers GENERIC
  implementation rules, not direction selection.

  ## Implementation pitfalls — automatic rejection
  These code patterns have produced false-high Sharpe in past runs and are blocked:

  ### Forbidden pattern A — look-ahead via transform('agg')
      WRONG : high.groupby(df.index.date).transform('max')   ← leaks full-day high
      WRONG : close.groupby(df.index.date).transform('mean') ← leaks full-day mean
      WRONG : volume.groupby(df.index.date).transform('sum') ← leaks full-day volume
      CORRECT: .cummax(), .cumsum(), .expanding().mean()

  ### Forbidden pattern B — full-day groupby + map (broadcasts future bars)
      WRONG :
          vwr = flow.groupby(df['trading_date']).sum() / vol.groupby(...).sum()
          df['col'] = df['trading_date'].map(vwr)
      CORRECT: groupby on filtered subset (e.g. night-only) then map to NEXT day's bars

  ### Forbidden pattern C — session aggregate broadcast inside loop
      WRONG :
          for sess_id, idx in df.groupby(session_id).groups.items():
              rv = np.sqrt((df.loc[idx,'close'].diff()**2).sum())  ← whole-session stat
              signal_vals[idx] = rv                                  ← broadcast to all bars
      CORRECT: compute incrementally bar-by-bar (cummax, expanding), or use only the first
      N bars (warmup window) of each session and ffill from there.

  ### Forbidden pattern D — groupby(bucket_id).transform('sum') for volume buckets
      WRONG : signed_flow.groupby(bucket_id).transform('sum') / V_star
              (bucket can span future bars → transform broadcasts future flow back)
      CORRECT: only use buckets where bucket_id < current_bucket_id (i.e. completed buckets)

  ### Forbidden — ATR-based exits
  Signal must encode only directional conviction. Exit logic must come from the signal
  value itself turning to 0, NEVER from ATR multiples.

  ### Forbidden — future shift
  Never use df.shift(-N) or .iloc[i:i+N].mean() or any operation reading bars t' > t.

  ## Signal output rules
  - Output a pd.Series of -1 / 0 / +1 (or a continuous value that np.sign(·) converts to
    these). Backtest engine binarizes via np.sign so don't rely on magnitudes.
  - Position carries until the signal changes (no auto-flat between bars).
  - Hold duration should be at least ~30 bars on average — round-trip cost is 3.05 pts and
    needs sufficient move to overcome it. Sub-30-bar holds tend to net negative.

  ## Risk management mechanisms to consider
  - Time filter: avoid first 15 min after day-session open (08:45–09:00) and last 30 min
    before close (13:15–13:45) when reversals are common
  - Volatility gate: suppress signal when realized volatility is too high or too low
    (use rolling std, NOT ATR)
  - Session break flat: force signal = 0 in the 15-min gap between day close (13:45) and
    night open (15:00) to avoid stale positions

  ## Target backtest profile (use these to judge your hypothesis)
  - Overall Sharpe > 0.3 (after cost)
  - Positive Sharpe in ≥ 5 of 7 years (2020-2026) — reject regime-specific signals
  - n_trades > 200 (otherwise sample too small to trust)
  - max_drawdown_pts not more than 2× the baseline's drawdown
  - If both day_sharpe and night_sharpe are near zero, the signal likely has no edge

factor_experiment_output_format: |-
  Respond with a JSON object where each key is a unique signal name (snake_case, no spaces):
  {
      "<signal_name>": {
          "description": "<what the signal measures and how it predicts price>",
          "formulation": "<mathematical/algorithmic description>",
          "variables": {
              "<param>": "<description and typical value range>"
          }
      }
  }

  Example:
  {
      "vwap_deviation_20": {
          "description": "Deviation of current close from 20-bar VWAP; positive when price is above average (bullish momentum)",
          "formulation": "vwap = (close * volume).rolling(20).sum() / volume.rolling(20).sum(); signal = (close - vwap) / vwap",
          "variables": {
              "lookback": "20 bars (20 minutes)"
          }
      }
  }

hypothesis_and_feedback: |-
  =========================================================
  {% for experiment, feedback in trace.hist %}
  # Trial {{ loop.index }}:
  ## Hypothesis
  {{ experiment.hypothesis }}
  Method Type: {{ experiment.hypothesis.method_type if experiment.hypothesis and experiment.hypothesis.method_type is defined else "unknown" }}
  ## Signals Implemented:
  {% for task in experiment.sub_tasks %}
  {% if task is not none and task.get_task_brief_information is defined %}
  {{ task.get_task_brief_information() }}
  {% endif %}
  {% endfor %}
  ## Backtest Result (test period):
  {% if experiment.result is not none %}
  Sharpe: {{ experiment.result.get('sharpe', 'N/A') }}  |  Annual Return: {{ experiment.result.get('annual_return_pts', 'N/A') }} pts  |  Max DD: {{ experiment.result.get('max_drawdown_pts', 'N/A') }} pts  |  Trades: {{ experiment.result.get('n_trades', 'N/A') }}  |  Day Sharpe: {{ experiment.result.get('day_sharpe', 'N/A') }}  |  Night Sharpe: {{ experiment.result.get('night_sharpe', 'N/A') }}
  {% if experiment.result.get('year_sharpes') %}Year-by-year: {{ experiment.result['year_sharpes'] }}  |  PositiveYears: {{ experiment.result.get('n_positive_years', '?') }}/{{ experiment.result['year_sharpes']|length }}{% endif %}
  {% if experiment.result.get('has_lookahead_bias') %}⚠ LOOK-AHEAD BIAS DETECTED{% endif %}
  {% else %}
  Execution failed.
  {% endif %}
  ## Feedback:
  Observation: {{ feedback.observations }}
  Hypothesis Evaluation: {{ feedback.hypothesis_evaluation }}
  Decision (SOTA replacement): {{ feedback.decision }}
  =========================================================
  {% endfor %}

